<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic 多人連線同樂版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* (與前一版相同的 UI 設計，加入了首頁建房/加房介面) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b1a2a; color: #333; display: flex; height: 100vh; overflow: hidden; justify-content: center; align-items: center; }

        /* 大廳與連線設定 */
        #lobby-container { background-color: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        #lobby-container h1 { color: #2980b9; margin-bottom: 20px; font-size: 24px; }
        .setting-group { margin-bottom: 15px; text-align: left; font-weight: bold; color: #34495e; }
        .setting-group input { width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7; outline: none; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: white; margin-bottom: 10px; }
        .btn-blue { background-color: #3498db; } .btn-blue:hover { background-color: #2980b9; }
        .btn-green { background-color: #2ecc71; } .btn-green:hover { background-color: #27ae60; }
        .divider { margin: 15px 0; border-bottom: 2px dashed #eee; }

        /* 遊戲主畫面 */
        #game-container { display: none; width: 100%; max-width: 1200px; height: 100vh; background-color: #12283d; padding: 10px; gap: 10px; flex-direction: row; }
        
        /* 玩家列表與畫布 */
        .sidebar { width: 220px; background-color: #ffffff; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { background-color: #2980b9; color: white; padding: 10px; font-weight: bold; text-align: center; font-size: 14px; }
        .player-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .player-item { display: flex; align-items: center; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .player-item.drawer { background-color: #e8f4fd; border: 2px solid #3498db; }
        .player-item.guessed { background-color: #e8f8f5; border: 2px solid #2ecc71; }
        .player-avatar { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; background: #34495e; }
        .player-info { flex-grow: 1; }
        .player-name { font-weight: bold; font-size: 13px; }
        .player-score { font-size: 11px; color: #666; font-weight: bold; }

        .main-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-bar { background-color: #fff; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 10px; }
        .timer { font-size: 20px; font-weight: bold; color: #e74c3c; }
        .word-hint { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-align: center; flex-grow: 1; color: #2c3e50; }
        .room-id-display { font-size: 12px; background: #ecf0f1; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .canvas-container { background-color: #fff; border-radius: 10px; padding: 5px; flex-grow: 1; position: relative; touch-action: none; }
        canvas { border: 1px solid #eee; border-radius: 5px; width: 100%; height: 100%; object-fit: contain; cursor: crosshair; }
        #canvas-lock-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 5; display: none; }
        
        .toolbar { background-color: #fff; border-radius: 10px; padding: 10px; margin-top: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; }
        .tool-btn { padding: 8px 15px; background-color: #ecf0f1; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* 聊天區 */
        .chat-area { width: 280px; }
        .chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 5px 8px; border-radius: 5px; word-break: break-word; }
        .msg.system { color: #8e44ad; font-weight: bold; background-color: #f4ecf7; }
        .msg.correct { color: #27ae60; font-weight: bold; background-color: #eafaf1; }
        .msg.guess { color: #333; background-color: #f9f9f9; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .chat-input-area input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; outline: none; }
        .chat-input-area button { padding: 10px 15px; background-color: #2980b9; color: white; border: none; border-radius: 0 5px 5px 0; font-weight: bold; }

        /* 出題視窗與載入畫面 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 350px; }
        .modal-content input { width: 100%; padding: 12px; font-size: 18px; text-align: center; border: 2px solid #bdc3c7; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .hidden { display: none !important; }

        /* 手機 RWD 排版 */
        @media (max-width: 800px) {
            #game-container { flex-direction: column; padding: 5px; gap: 5px; }
            .sidebar:not(.chat-area) { width: 100%; flex-direction: row; height: 70px; }
            .sidebar-header { display: none; }
            .player-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; align-items: center; }
            .player-item { min-width: 120px; height: 50px; }
            .main-area { height: 50vh; flex-grow: 0; }
            .chat-area { width: 100%; flex-grow: 1; height: 0; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="lobby-container">
    <h1>🎨 網路連線大廳</h1>
    <div class="setting-group">
        <label>你的遊戲暱稱：</label>
        <input type="text" id="player-name" placeholder="輸入暱稱" value="玩家">
    </div>
    <button class="btn btn-blue" onclick="createRoom()">👑 建立新房間 (房主)</button>
    <div class="divider"></div>
    <div class="setting-group">
        <label>加入朋友的房間：</label>
        <input type="text" id="join-room-id" placeholder="輸入房間代碼">
    </div>
    <button class="btn btn-green" onclick="joinRoom()">🔗 加入房間</button>
</div>

<div id="loading-modal" class="modal-overlay hidden">
    <div class="modal-content"><h2 id="loading-text" style="color:#2980b9;">連線中，請稍候...</h2></div>
</div>

<div id="game-container">
    <div class="sidebar">
        <div class="sidebar-header">玩家列表</div>
        <div class="player-list" id="player-list-ui"></div>
        <div style="padding:10px;">
            <button class="btn btn-blue" id="btn-start-game" style="display:none;" onclick="startGameHost()">🚀 開始遊戲</button>
        </div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <div class="timer">⏱️ <span id="game-timer">60</span></div>
            <div class="word-hint" id="word-display">等待房主開始遊戲...</div>
            <div class="room-id-display" onclick="copyRoomId()" id="room-id-ui">代碼: ---</div>
        </div>

        <div class="canvas-container" id="canvas-wrapper">
            <div id="canvas-lock-overlay"></div>
            <canvas id="drawing-board" width="800" height="600"></canvas>
        </div>

        <div class="toolbar" id="game-toolbar">
            <div class="color-btn" style="background: #000000;" onclick="changeColor('#000000')"></div>
            <div class="color-btn" style="background: #e74c3c;" onclick="changeColor('#e74c3c')"></div>
            <div class="color-btn" style="background: #3498db;" onclick="changeColor('#3498db')"></div>
            <div class="color-btn" style="background: #f1c40f;" onclick="changeColor('#f1c40f')"></div>
            <div class="color-btn" style="background: #2ecc71;" onclick="changeColor('#2ecc71')"></div>
            <div class="color-btn" style="background: #ffffff; border-color: #999;" onclick="changeColor('#ffffff')" title="橡皮擦"></div>
            <button class="tool-btn" onclick="requestClearCanvas()">🗑️ 清空</button>
        </div>
    </div>

    <div class="sidebar chat-area">
        <div class="sidebar-header">聊天與猜題區</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="輸入答案..." onkeypress="handleChatKey(event)">
            <button onclick="submitChat()">送出</button>
        </div>
    </div>
</div>

<div id="prompt-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 style="color:#2980b9;">輪到你出題！</h2>
        <p>請在 <span id="modal-timer" style="color:#e74c3c; font-weight:bold;">30</span> 秒內輸入</p>
        <input type="text" id="custom-word-input" placeholder="例如：蘋果、皮卡丘" autocomplete="off">
        <button class="btn btn-green" onclick="submitWord()">確認出題</button>
    </div>
</div>

<script>
    /* ================= 網路連線核心 (PeerJS) ================= */
    let peer = null;
    let myId = "";
    let myName = "";
    let isHost = false;
    
    // 房主專用資料
    let clientConnections = [];
    let players = []; // { id, name, score, hasGuessed, isDrawer }
    let gameState = { status: 'LOBBY', drawerIndex: 0, currentWord: "", timeLeft: 60, drawTime: 60 };
    let gameTimerInterval = null;
    let promptInterval = null;

    // 客戶端專用資料
    let hostConnection = null;

    function initApp() {
        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        document.getElementById('chat-messages').addEventListener('touchmove', function(e) { e.stopPropagation(); }, false);
        document.querySelector('.player-list').addEventListener('touchmove', function(e) { e.stopPropagation(); }, false);
    }

    // 1. 建立房間 (房主)
    function createRoom() {
        myName = document.getElementById('player-name').value.trim() || "房主";
        showLoading("建立房間中...");
        
        // 隨機產生 5 碼房間代號，加上前綴避免衝突
        const roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
        peer = new Peer('GARTIC-' + roomCode);

        peer.on('open', (id) => {
            isHost = true;
            myId = id;
            players.push({ id: myId, name: myName, score: 0, hasGuessed: false, isDrawer: false });
            enterGameScreen(roomCode);
            document.getElementById('btn-start-game').style.display = 'block';
            addChat('系統', '房間建立成功！請將代碼分享給朋友。', 'system');
            updatePlayersUI();
        });

        // 監聽其他玩家加入
        peer.on('connection', (conn) => {
            conn.on('open', () => {
                clientConnections.push(conn);
                conn.on('data', (data) => handleDataFromClient(conn, data));
            });
            conn.on('close', () => {
                players = players.filter(p => p.id !== conn.peer);
                clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
                broadcast({ type: 'sync_players', players: players });
                updatePlayersUI();
            });
        });
    }

    // 2. 加入房間 (客戶端)
    function joinRoom() {
        myName = document.getElementById('player-name').value.trim() || "玩家";
        let roomCode = document.getElementById('join-room-id').value.trim().toUpperCase();
        if(!roomCode) return alert('請輸入房間代碼！');
        
        showLoading("連線至房間...");
        peer = new Peer(); // 客戶端隨機產生 ID 即可
        
        peer.on('open', (id) => {
            myId = id;
            isHost = false;
            hostConnection = peer.connect('GARTIC-' + roomCode);
            
            hostConnection.on('open', () => {
                enterGameScreen(roomCode);
                hostConnection.send({ type: 'join', id: myId, name: myName });
            });
            
            hostConnection.on('data', (data) => handleDataFromHost(data));
            hostConnection.on('close', () => { alert("已與房主斷線！"); location.reload(); });
        });

        peer.on('error', (err) => {
            hideLoading();
            alert("連線失敗，請確認房間代碼是否正確。");
        });
    }

    /* ================= 房主邏輯 (Server端處理) ================= */
    
    // 房主接收來自玩家的資料
    function handleDataFromClient(conn, data) {
        if (data.type === 'join') {
            players.push({ id: data.id, name: data.name, score: 0, hasGuessed: false, isDrawer: false });
            broadcast({ type: 'sync_players', players: players });
            broadcast({ type: 'chat', sender: '系統', text: `${data.name} 加入了房間！`, msgType: 'system' });
            updatePlayersUI();
        }
        else if (data.type === 'chat') {
            handleChatAttempt(data.senderId, data.text);
        }
        else if (data.type === 'draw') {
            // 將畫圖數據廣播給所有"其他人"
            clientConnections.forEach(c => {
                if(c.peer !== conn.peer) c.send(data);
            });
            // 房主自己也畫在畫布上
            executeDrawLine(data);
        }
        else if (data.type === 'clear_canvas') {
            broadcast({ type: 'clear_canvas' });
            clearCanvasLocal();
        }
        else if (data.type === 'submit_word') {
            // 收到作畫者出的題目
            gameState.currentWord = data.word;
            startGameTimer();
        }
    }

    // 房主廣播訊息給所有人
    function broadcast(data) {
        clientConnections.forEach(conn => conn.send(data));
        // 如果是聊天，房主自己也要顯示
        if(data.type === 'chat') addChat(data.sender, data.text, data.msgType);
    }

    /* ================= 遊戲流程控制 (僅限房主發號施令) ================= */
    
    function startGameHost() {
        if(players.length < 2) return alert("至少需要 2 名玩家才能開始！");
        document.getElementById('btn-start-game').style.display = 'none';
        gameState.drawerIndex = 0;
        startRoundTurn();
    }

    function startRoundTurn() {
        clearInterval(gameTimerInterval);
        broadcast({ type: 'clear_canvas' });
        clearCanvasLocal();
        players.forEach(p => { p.hasGuessed = false; p.isDrawer = false; });
        
        let currentDrawer = players[gameState.drawerIndex];
        currentDrawer.isDrawer = true;
        
        broadcast({ type: 'sync_players', players: players });
        broadcast({ type: 'chat', sender: '系統', text: `▼ 輪到【${currentDrawer.name}】出題與作畫！`, msgType: 'system' });
        updatePlayersUI();

        if (currentDrawer.id === myId) {
            // 房主自己畫
            openPromptModal();
        } else {
            // 通知特定玩家出題
            broadcast({ type: 'prompt_request', targetId: currentDrawer.id });
            broadcast({ type: 'sync_word', text: "等待出題中..." });
            document.getElementById('word-display').innerText = "等待出題中...";
        }
        setToolLockStatus(currentDrawer.id !== myId);
    }

    function startGameTimer() {
        gameState.timeLeft = gameState.drawTime;
        
        // 製作字數遮罩廣播給其他人
        let maskedWord = "";
        for(let i=0; i<gameState.currentWord.length; i++) maskedWord += "_ ";
        
        broadcast({ type: 'sync_word_start', masked: maskedWord, time: gameState.timeLeft });
        
        // 房主自己顯示完整題目 (如果房主是畫家的話)
        if(players[gameState.drawerIndex].id === myId) {
            document.getElementById('word-display').innerText = `${gameState.currentWord} (你作畫)`;
        } else {
            document.getElementById('word-display').innerText = maskedWord;
        }

        gameTimerInterval = setInterval(() => {
            gameState.timeLeft--;
            broadcast({ type: 'sync_time', time: gameState.timeLeft });
            document.getElementById('game-timer').innerText = gameState.timeLeft;
            
            if (gameState.timeLeft <= 0) {
                endRoundTurn();
            }
        }, 1000);
    }

    function endRoundTurn() {
        clearInterval(gameTimerInterval);
        broadcast({ type: 'chat', sender: '系統', text: `時間到！正確答案是：【${gameState.currentWord}】`, msgType: 'info' });
        
        gameState.drawerIndex++;
        if (gameState.drawerIndex >= players.length) gameState.drawerIndex = 0; // 循環輪替
        
        setTimeout(startRoundTurn, 4000); // 4秒後進入下一輪
    }

    // 房主驗證猜題邏輯
    function handleChatAttempt(senderId, text) {
        let sender = players.find(p => p.id === senderId);
        let drawer = players[gameState.drawerIndex];

        // 判斷是否猜對 (不能是畫家，不能已經猜對，文字要全等)
        if (senderId !== drawer.id && !sender.hasGuessed && text === gameState.currentWord && gameState.timeLeft > 0) {
            sender.hasGuessed = true;
            // 給分機制
            let timeBonus = Math.floor((gameState.timeLeft / gameState.drawTime) * 10) + 3;
            sender.score += timeBonus;
            drawer.score += 4; // 畫家保底加分

            broadcast({ type: 'chat', sender: '系統', text: `🎉 ${sender.name} 猜對了！`, msgType: 'correct' });
            broadcast({ type: 'sync_players', players: players });
            updatePlayersUI();
            
            // 檢查是否所有人都猜對了
            let allGuessed = players.every(p => p.isDrawer || p.hasGuessed);
            if(allGuessed) {
                clearInterval(gameTimerInterval);
                setTimeout(endRoundTurn, 2000);
            }
        } else {
            // 普通聊天
            broadcast({ type: 'chat', sender: sender.name, text: text, msgType: 'guess' });
        }
    }

    /* ================= 客戶端邏輯 (接收指令) ================= */
    function handleDataFromHost(data) {
        if (data.type === 'sync_players') {
            players = data.players;
            updatePlayersUI();
            
            // 根據自己是否為畫家，鎖定/解鎖畫布
            let myPlayer = players.find(p => p.id === myId);
            if(myPlayer) setToolLockStatus(!myPlayer.isDrawer);
        }
        else if (data.type === 'chat') {
            addChat(data.sender, data.text, data.msgType);
        }
        else if (data.type === 'sync_word') {
            document.getElementById('word-display').innerText = data.text;
        }
        else if (data.type === 'sync_word_start') {
            document.getElementById('game-timer').innerText = data.time;
            // 只有當自己不是畫家時，才顯示底線
            let myPlayer = players.find(p => p.id === myId);
            if(myPlayer && !myPlayer.isDrawer) {
                document.getElementById('word-display').innerText = data.masked;
            }
        }
        else if (data.type === 'sync_time') {
            document.getElementById('game-timer').innerText = data.time;
        }
        else if (data.type === 'draw') {
            executeDrawLine(data);
        }
        else if (data.type === 'clear_canvas') {
            clearCanvasLocal();
        }
        else if (data.type === 'prompt_request') {
            if (data.targetId === myId) openPromptModal();
        }
    }

    /* ================= 出題介面與聊天發送 ================= */
    function openPromptModal() {
        document.getElementById('prompt-modal').classList.remove('hidden');
        document.getElementById('custom-word-input').value = "";
        let timeLeft = 30;
        document.getElementById('modal-timer').innerText = timeLeft;
        
        promptInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('modal-timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                document.getElementById('custom-word-input').value = "時鐘"; // 超時防呆
                submitWord();
            }
        }, 1000);
    }

    function submitWord() {
        let word = document.getElementById('custom-word-input').value.trim();
        if (!word) return;
        clearInterval(promptInterval);
        document.getElementById('prompt-modal').classList.add('hidden');
        
        document.getElementById('word-display').innerText = `${word} (你作畫)`;
        
        if (isHost) {
            gameState.currentWord = word;
            startGameTimer();
        } else {
            hostConnection.send({ type: 'submit_word', word: word });
        }
    }

    function handleChatKey(e) { if (e.key === 'Enter') submitChat(); }
    
    function submitChat() {
        let input = document.getElementById('chat-input');
        let text = input.value.trim();
        if (!text) return;
        input.value = "";
        
        if (isHost) handleChatAttempt(myId, text);
        else hostConnection.send({ type: 'chat', senderId: myId, text: text });
    }

    function addChat(sender, text, type) {
        let box = document.getElementById('chat-messages');
        box.innerHTML += `<div class="msg ${type}"><b>${sender}</b>：${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    /* ================= UI 介面切換 ================= */
    function showLoading(msg) {
        document.getElementById('loading-text').innerText = msg;
        document.getElementById('loading-modal').classList.remove('hidden');
    }
    function hideLoading() { document.getElementById('loading-modal').classList.add('hidden'); }
    
    function enterGameScreen(code) {
        hideLoading();
        document.getElementById('lobby-container').classList.add('hidden');
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('room-id-ui').innerText = "房號: " + code.replace('GARTIC-', '');
    }

    function updatePlayersUI() {
        const container = document.getElementById('player-list-ui'); container.innerHTML = '';
        let sorted = [...players].sort((a, b) => b.score - a.score);
        sorted.forEach((p, idx) => {
            let cls = "player-item" + (p.isDrawer ? " drawer" : "") + (p.hasGuessed ? " guessed" : "");
            container.innerHTML += `<div class="${cls}"><div class="player-avatar">${idx+1}</div>
            <div class="player-info"><div class="player-name">${p.name}</div><div class="player-score">${p.score} pts</div></div></div>`;
        });
    }

    function copyRoomId() {
        let code = document.getElementById('room-id-ui').innerText.replace("房號: ", "");
        navigator.clipboard.writeText(code);
        alert("已複製房間代碼：" + code);
    }

    function setToolLockStatus(locked) {
        document.getElementById('canvas-lock-overlay').style.display = locked ? 'block' : 'none';
        document.getElementById('game-toolbar').style.opacity = locked ? '0.3' : '1';
    }

    /* ================= 畫布邏輯 (同步繪圖) ================= */
    const canvas = document.getElementById('drawing-board');
    const ctx = canvas.getContext('2d');
    let isDrawing = false; let currentColor = '#000000'; let currentLineWidth = 5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    function changeColor(color) { currentColor = color; currentLineWidth = (color === '#ffffff') ? 30 : 5; }
    
    // 按鈕呼叫清空
    function requestClearCanvas() {
        let myPlayer = players.find(p => p.id === myId);
        if(!myPlayer || !myPlayer.isDrawer) return;
        
        clearCanvasLocal();
        if(isHost) broadcast({ type: 'clear_canvas' });
        else hostConnection.send({ type: 'clear_canvas' });
    }
    function clearCanvasLocal() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
    }

    function startDraw(e) {
        let myPlayer = players.find(p => p.id === myId);
        if(!myPlayer || !myPlayer.isDrawer) return;
        e.preventDefault(); isDrawing = true;
        const pos = getPos(e);
        sendDrawData(pos.x, pos.y, true);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault(); const pos = getPos(e);
        sendDrawData(pos.x, pos.y, false);
    }

    function endDraw(e) { if (isDrawing) { e.preventDefault(); isDrawing = false; } }

    function sendDrawData(x, y, isStart) {
        executeDrawLine({ x, y, color: currentColor, width: currentLineWidth, isStart });
        let data = { type: 'draw', x, y, color: currentColor, width: currentLineWidth, isStart };
        if (isHost) broadcast(data);
        else hostConnection.send(data);
    }

    let lastX = 0, lastY = 0;
    function executeDrawLine(data) {
        ctx.strokeStyle = data.color;
        ctx.lineWidth = data.width;
        if (data.isStart) {
            ctx.beginPath(); ctx.moveTo(data.x, data.y);
            lastX = data.x; lastY = data.y;
        } else {
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(data.x, data.y); ctx.stroke();
            lastX = data.x; lastY = data.y;
        }
    }

    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseout', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });
</script>

</body>
</html>
