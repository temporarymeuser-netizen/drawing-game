<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic 多人連線終極版</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b1a2a; color: #333; display: flex; height: 100vh; height: 100dvh; overflow: hidden; justify-content: center; align-items: center; margin: 0; }

        #lobby-container { background-color: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        #lobby-container h1 { color: #2980b9; margin-bottom: 20px; font-size: 24px; }
        .setting-group { margin-bottom: 15px; text-align: left; font-weight: bold; color: #34495e; font-size: 14px; }
        .setting-group input, .setting-group select { width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7; outline: none; margin-top: 5px; }
        
        #host-section { background: #f7f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e1e8ed; margin-bottom: 15px; }
        
        .btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: white; margin-bottom: 5px; }
        .btn-blue { background-color: #3498db; } .btn-blue:hover { background-color: #2980b9; }
        .btn-green { background-color: #2ecc71; } .btn-green:hover { background-color: #27ae60; }
        .btn-orange { background-color: #e67e22; } .btn-orange:hover { background-color: #d35400; }
        .btn-light { background-color: #ecf0f1; color: #2980b9; border: 1px solid #bdc3c7; } .btn-light:hover { background-color: #ddecfa; }
        .divider { margin: 15px 0; border-bottom: 2px dashed #eee; }

        #game-container { display: none; width: 100%; max-width: 1200px; height: 100%; max-height: 100dvh; background-color: #12283d; padding: 10px; gap: 10px; flex-direction: row; }
        
        .sidebar { width: 220px; background-color: #ffffff; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: relative; }
        .sidebar-header { background-color: #2980b9; color: white; padding: 10px; font-weight: bold; text-align: center; font-size: 14px; }
        .player-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .player-item { display: flex; align-items: center; padding: 8px; border-radius: 8px; border: 1px solid #eee; position: relative; transition: 0.3s; }
        .player-item.drawer { background-color: #e8f4fd; border: 2px solid #3498db; }
        .player-item.guessed { background-color: #e8f8f5; border: 2px solid #2ecc71; }
        .player-avatar { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; background: #34495e; flex-shrink: 0; }
        .player-info { flex-grow: 1; min-width: 0; }
        .player-name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-score { font-size: 11px; color: #666; font-weight: bold; }
        
        .kick-btn { background: #e74c3c; border: none; border-radius: 5px; color: white; padding: 4px 8px; font-size: 11px; cursor: pointer; margin-left: 5px; flex-shrink: 0; }
        .kick-btn:hover { background: #c0392b; }

        .action-panel { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; border-top: 1px solid #eee; }
        .action-panel .btn { margin: 0; }

        .score-float { position: absolute; right: 10px; color: #2ecc71; font-weight: bold; font-size: 16px; animation: floatUp 1.2s ease-out forwards; z-index: 10; text-shadow: 1px 1px 0 #fff; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-25px); opacity: 0; } }

        .main-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; align-items: center; }
        .top-bar { width: 100%; background-color: #fff; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 10px; flex-shrink: 0; }
        .timer { font-size: 20px; font-weight: bold; color: #e74c3c; width: 60px; }
        .word-hint { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-align: center; flex-grow: 1; color: #2c3e50; }
        .round-info { font-size: 14px; font-weight: bold; color: #7f8c8d; text-align: right; width: 90px; }
        
        .canvas-container { background-color: #fff; border-radius: 10px; padding: 5px; position: relative; touch-action: none; display: flex; justify-content: center; align-items: center; width: 100%; flex-grow: 1; min-height: 0; }
        canvas { border: 1px solid #eee; border-radius: 5px; width: 100%; height: 100%; max-height: 100%; aspect-ratio: 4/3; cursor: crosshair; object-fit: fill; }
        #canvas-lock-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 5; display: none; }
        
        .toolbar { width: 100%; background-color: #fff; border-radius: 10px; padding: 10px; margin-top: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; align-items: center;}
        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; flex-shrink: 0; transition: transform 0.1s;}
        .color-btn:active { transform: scale(0.8); }
        .tool-btn { padding: 8px 12px; background-color: #ecf0f1; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        .eraser-btn { border: 2px solid #bdc3c7; background: #fff; }

        .chat-area { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; }
        .chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 5px 8px; border-radius: 5px; word-break: break-word; }
        .msg.system { color: #8e44ad; font-weight: bold; background-color: #f4ecf7; }
        .msg.correct { color: #27ae60; font-weight: bold; background-color: #eafaf1; }
        .msg.guess { color: #333; background-color: #f9f9f9; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; flex-shrink: 0; }
        .chat-input-area input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; outline: none; }
        .chat-input-area button { padding: 10px 15px; background-color: #2980b9; color: white; border: none; border-radius: 0 5px 5px 0; font-weight: bold; flex-shrink: 0; }
        input:disabled { background-color: #f1f2f6; cursor: not-allowed; color: #a4b0be; }
        button:disabled { background-color: #a4b0be; cursor: not-allowed; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content input { width: 100%; padding: 12px; font-size: 18px; text-align: center; border: 2px solid #bdc3c7; border-radius: 8px; outline: none; }
        .hidden { display: none !important; }
        
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 18px; }
        .result-item:first-child { font-size: 24px; font-weight: bold; color: #d35400; background: #fff8e1; border-radius: 8px; border: none; margin-bottom: 5px;}

        @media (max-width: 800px) {
            #game-container { flex-direction: column; padding: 5px; gap: 5px; }
            .sidebar:not(.chat-area) { width: 100%; flex-direction: row; height: 60px; flex-shrink: 0; }
            .sidebar-header { display: none; }
            .player-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; align-items: center; padding: 5px; }
            .player-item { min-width: 130px; height: 45px; padding: 5px; }
            .player-avatar { width: 25px; height: 25px; font-size: 12px; margin-right: 5px; }
            
            .action-panel { flex-direction: row; padding: 5px; align-items: center; border-top: none; border-left: 1px solid #eee; }
            .action-panel .btn { padding: 6px 10px; font-size: 12px; white-space: nowrap; height: 36px; line-height: 1; }

            .main-area { flex-grow: 1; min-height: 0; }
            .top-bar { padding: 5px; margin-bottom: 5px; }
            .timer, .round-info { font-size: 12px; width: auto;}
            .word-hint { font-size: 16px; }
            .canvas-container { flex-grow: 1; height: 0; min-height: 0; }
            .toolbar { padding: 5px; margin-top: 5px; gap: 6px; }
            .color-btn { width: 24px; height: 24px; }
            .tool-btn { padding: 6px 10px; font-size: 12px; }
            .chat-area { width: 100%; height: 30%; flex-shrink: 0; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="lobby-container">
    <h1 id="lobby-title">🎨 網路連線大廳</h1>
    <div class="setting-group">
        <label>設定遊戲暱稱：</label>
        <input type="text" id="player-name" placeholder="輸入你想顯示的名字" value="玩家">
    </div>
    
    <div id="host-section">
        <div class="setting-group">
            <label>設定回合數 (僅房主有效)：</label>
            <select id="setting-rounds"><option value="2">2 回合</option><option value="3" selected>3 回合</option><option value="5">5 回合</option></select>
        </div>
        <button class="btn btn-blue" onclick="createRoom()">👑 建立新房間</button>
        <div class="divider"></div>
    </div>
    
    <div class="setting-group" id="join-input-group">
        <label>加入朋友的房間：</label>
        <input type="text" id="join-room-id" placeholder="輸入代碼">
    </div>
    <button class="btn btn-green" id="join-btn" onclick="joinRoom()">🔗 點我加入</button>
</div>

<div id="loading-modal" class="modal-overlay hidden"><div class="modal-content"><h2 id="loading-text" style="color:#2980b9;">連線中...</h2></div></div>

<div id="game-container">
    <div class="sidebar">
        <div class="sidebar-header">玩家名單</div>
        <div class="player-list" id="player-list-ui"></div>
        <div class="action-panel">
            <button class="btn btn-orange" id="btn-start-game" style="display:none;" onclick="startGameHost()">🚀 開始遊戲</button>
            <button class="btn btn-light" id="room-id-ui" onclick="copyInviteLink()">🔗 複製連結</button>
        </div>
    </div>
    <div class="main-area">
        <div class="top-bar">
            <div class="timer">⏱️ <span id="game-timer">--</span></div>
            <div class="word-hint" id="word-display">等待房主開始...</div>
            <div class="round-info" id="round-display">回合 - / -</div>
        </div>
        <div class="canvas-container" id="canvas-wrapper">
            <div id="canvas-lock-overlay"></div>
            <canvas id="drawing-board" width="800" height="600"></canvas>
        </div>
        
        <div class="toolbar" id="game-toolbar">
            <div class="color-btn" style="background: #000000;" onclick="changeColor('#000000')"></div>
            <div class="color-btn" style="background: #7f8c8d;" onclick="changeColor('#7f8c8d')"></div>
            <div class="color-btn" style="background: #e74c3c;" onclick="changeColor('#e74c3c')"></div>
            <div class="color-btn" style="background: #e67e22;" onclick="changeColor('#e67e22')"></div>
            <div class="color-btn" style="background: #f1c40f;" onclick="changeColor('#f1c40f')"></div>
            <div class="color-btn" style="background: #2ecc71;" onclick="changeColor('#2ecc71')"></div>
            <div class="color-btn" style="background: #1abc9c;" onclick="changeColor('#1abc9c')"></div>
            <div class="color-btn" style="background: #3498db;" onclick="changeColor('#3498db')"></div>
            <div class="color-btn" style="background: #9b59b6;" onclick="changeColor('#9b59b6')"></div>
            <div class="color-btn" style="background: #fd79a8;" onclick="changeColor('#fd79a8')"></div>
            <div class="color-btn" style="background: #8b4513;" onclick="changeColor('#8b4513')"></div>
            
            <button class="tool-btn eraser-btn" onclick="changeColor('#ffffff')">🧽 橡皮擦</button>
            <button class="tool-btn" onclick="requestClearCanvas()">🗑️ 清空</button>
        </div>
    </div>
    <div class="sidebar chat-area">
        <div class="sidebar-header">聊天與猜測</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="輸入答案..." onkeypress="handleChatKey(event)">
            <button id="chat-submit-btn" onclick="submitChat()">送出</button>
        </div>
    </div>
</div>

<div id="prompt-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 style="color:#2980b9; margin-bottom:10px;">輪到你出題！</h2>
        <p style="margin-bottom:15px; color:#555;">請在 <span id="modal-timer" style="color:#e74c3c; font-weight:bold; font-size: 22px;">30</span> 秒內選擇或輸入</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn btn-blue" id="btn-choice-1" onclick="submitWord(this.innerText)">選項 1</button>
            <button class="btn btn-blue" id="btn-choice-2" onclick="submitWord(this.innerText)">選項 2</button>
        </div>
        
        <div style="margin: 15px 0; color: #7f8c8d; font-size: 14px; font-weight: bold;">—— ✏️ 或自行輸入你想畫的 ——</div>
        
        <div style="display: flex; gap: 5px;">
            <input type="text" id="custom-word-input" placeholder="自訂題目..." autocomplete="off" style="margin-bottom: 0;">
            <button class="btn btn-green" style="width: 80px; margin-bottom: 0; flex-shrink: 0;" onclick="submitCustomWord()">確定</button>
        </div>
    </div>
</div>

<div id="results-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 450px;">
        <h2 style="color:#f39c12; margin-bottom: 15px; font-size: 28px;">🏆 遊戲結算 🏆</h2>
        <div id="results-list" style="margin-bottom: 25px; text-align: left;"></div>
        <button class="btn btn-blue" onclick="location.href = window.location.href.split('?')[0]">🔄 回到首頁</button>
    </div>
</div>

<script>
    const SERVER_URL = "https://my-gartic-server.onrender.com"; 

    let socket = null; let myId = ""; let myName = ""; let isHost = false;
    let players = []; 
    let gameState = { status: 'LOBBY', drawerIndex: 0, currentRound: 1, maxRounds: 3, currentWord: "", timeLeft: 60, drawTime: 60, isPlaying: false, usedWords: [] };
    let gameTimerInterval = null; let promptInterval = null;
    let currentRoomCode = "";
    
    let mySessionId = localStorage.getItem('gartic_session_id');
    if(!mySessionId) {
        mySessionId = Math.random().toString(36).substring(2, 10);
        localStorage.setItem('gartic_session_id', mySessionId);
    }

    const autoWordBank = [
        "蘋果", "香蕉", "貓咪", "狗狗", "汽車", "火車", "電腦", "時鐘", "皮卡丘", "大象",
        "飛機", "漢堡", "珍奶", "雨傘", "西瓜", "企鵝", "長頸鹿", "烏龜", "剪刀", "手機",
        "電視", "吉他", "鋼琴", "籃球", "棒球", "腳踏車", "火箭", "外星人", "鬼魂", "南瓜",
        "雪人", "聖誕樹", "太陽", "月亮", "星星", "彩虹", "火山", "颱風", "冰淇淋", "蛋糕",
        "薯條", "披薩", "壽司", "火鍋", "甜甜圈", "蝴蝶", "蜜蜂", "蜘蛛", "螃蟹", "蝸牛",
        "章魚", "海豚", "鯨魚", "美人魚", "獨角獸", "恐龍", "城堡", "公主", "國王", "警察",
        "醫生", "護士", "老師", "消防員", "眼鏡", "手錶", "戒指", "鑽石", "鑰匙", "背包",
        "牙刷", "馬桶", "沙發", "電風扇", "冷氣", "麥克風", "耳機", "剪草機", "望遠鏡", "鞋子"
    ];

    function initApp() {
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        document.getElementById('chat-messages').addEventListener('touchmove', e => e.stopPropagation(), false);
        document.querySelector('.player-list').addEventListener('touchmove', e => e.stopPropagation(), false);
        checkUrlForInvite();
        
        window.addEventListener('beforeunload', (e) => {
            if (isHost && gameState.isPlaying) { e.preventDefault(); e.returnValue = ''; }
        });
    }

    function checkUrlForInvite() {
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        if (roomId) {
            document.getElementById('lobby-title').innerText = "🔗 加入好友房間";
            document.getElementById('host-section').style.display = 'none';
            document.getElementById('join-input-group').style.display = 'none';
            document.getElementById('join-room-id').value = roomId;
            document.getElementById('join-btn').innerText = `🚀 加入房間 [${roomId}]`;
            setTimeout(() => document.getElementById('player-name').focus(), 500);
        }
    }

    function copyInviteLink() {
        if(!currentRoomCode) return;
        let baseUrl = window.location.href.split('?')[0];
        let inviteLink = `${baseUrl}?room=${currentRoomCode}`;
        navigator.clipboard.writeText(inviteLink).then(() => alert(`🔗 邀請連結已複製！\n\n網址：\n${inviteLink}`)).catch(() => alert("複製失敗，請手動複製房號：" + currentRoomCode));
    }

    function connectToServer(callback) {
        showLoading("連線至伺服器...");
        socket = io(SERVER_URL);
        
        socket.on('connect', () => {
            myId = socket.id;
            hideLoading();
            callback();
        });

        socket.on('data_from_host', data => handleDataFromHost(data));
        socket.on('data_from_client', data => handleDataFromClient(data));
        socket.on('client_left', clientId => handlePlayerDrop(clientId));
        
        socket.on('host_left', () => {
            alert("房主已關閉房間，遊戲解散！");
            location.href = window.location.href.split('?')[0];
        });
    }

    function createRoom() {
        myName = document.getElementById('player-name').value.trim() || "房主";
        gameState.maxRounds = parseInt(document.getElementById('setting-rounds').value) || 3;
        
        connectToServer(() => {
            isHost = true;
            currentRoomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            socket.emit('create_room', currentRoomCode);
            
            players.push({ id: myId, sessionId: mySessionId, name: myName, score: 0, hasGuessed: false, isDrawer: false });
            enterGameScreen(currentRoomCode);
            document.getElementById('btn-start-game').style.display = 'block';
            addChat('系統', '房間建立成功！', 'system');
            updatePlayersUI();
        });
    }

    function joinRoom() {
        myName = document.getElementById('player-name').value.trim() || "玩家";
        let roomCode = document.getElementById('join-room-id').value.trim().toUpperCase();
        if(!roomCode) return alert('請輸入房間代碼！');
        
        connectToServer(() => {
            isHost = false;
            currentRoomCode = roomCode;
            socket.emit('join_room', currentRoomCode);
            enterGameScreen(currentRoomCode);
            socket.emit('send_to_host', { type: 'join', id: myId, sessionId: mySessionId, name: myName });
        });
    }

    function handleDataFromClient(data) {
        if (data.type === 'join') {
            let existingPlayer = players.find(p => p.sessionId === data.sessionId);
            if (existingPlayer) {
                existingPlayer.id = data.clientId; 
                existingPlayer.name = data.name;
                sendHostBroadcast({ type: 'chat', sender: '系統', text: `${data.name} 重新連線了！`, msgType: 'info' });
            } else {
                players.push({ id: data.clientId, sessionId: data.sessionId, name: data.name, score: 0, hasGuessed: false, isDrawer: false });
                sendHostBroadcast({ type: 'chat', sender: '系統', text: `${data.name} 加入房間！`, msgType: 'system' });
            }
            
            sendHostBroadcast({ type: 'sync_players', players: players });
            updatePlayersUI();
            
            if (gameState.isPlaying) {
                socket.emit('host_broadcast', { type: 'sync_canvas', image: canvas.toDataURL() }); 
            }
        }
        else if (data.type === 'chat') handleChatAttempt(data.clientId, data.text);
        else if (data.type === 'draw') { sendHostBroadcast(data); executeDrawLine(data); }
        else if (data.type === 'clear_canvas') { sendHostBroadcast({ type: 'clear_canvas', senderId: data.senderId }); clearCanvasLocal(); }
        else if (data.type === 'submit_word') { 
            gameState.currentWord = data.word; 
            gameState.usedWords.push(data.word); 
            startGameTimer(); 
        }
    }
    
    function handlePlayerDrop(droppedId) {
        let droppedIndex = players.findIndex(p => p.id === droppedId);
        if(droppedIndex === -1) return;
        
        let droppedPlayer = players[droppedIndex];
        players.splice(droppedIndex, 1);
        
        sendHostBroadcast({ type: 'sync_players', players: players });
        updatePlayersUI();
        
        if (gameState.isPlaying) {
            if (droppedPlayer.isDrawer) {
                sendHostBroadcast({ type: 'chat', sender: '系統', text: `⚠️ 作畫者離開，強制換人！`, msgType: 'system' });
                clearInterval(gameTimerInterval); clearInterval(promptInterval);
                gameState.currentWord = ""; 
                gameState.drawerIndex = droppedIndex;
                if (gameState.drawerIndex >= players.length) { gameState.drawerIndex = 0; gameState.currentRound++; }
                if (gameState.currentRound > gameState.maxRounds) { gameState.isPlaying = false; setTimeout(triggerGameOver, 2000); } 
                else { setTimeout(startRoundTurn, 2000); }
            } else {
                if (droppedIndex < gameState.drawerIndex) gameState.drawerIndex--;
                checkAllGuessed();
            }
        }
    }

    function kickPlayer(targetId) {
        if(!confirm("確定要踢除這位玩家嗎？")) return;
        socket.emit('host_kick', targetId);
        handlePlayerDrop(targetId);
    }

    function sendHostBroadcast(data) {
        socket.emit('host_broadcast', data);
        if(data.type === 'chat') addChat(data.sender, data.text, data.msgType);
        if(data.type === 'score_anim') showScoreAnim(data.targetId, data.points); 
    }

    function startGameHost() {
        if(players.length < 2) return alert("至少需要 2 名玩家！");
        document.getElementById('btn-start-game').style.display = 'none';
        gameState.currentRound = 1; gameState.drawerIndex = 0; gameState.isPlaying = true;
        sendHostBroadcast({ type: 'game_start', maxRounds: gameState.maxRounds });
        startRoundTurn();
    }

    function startRoundTurn() {
        clearInterval(gameTimerInterval);
        sendHostBroadcast({ type: 'clear_canvas', senderId: myId }); clearCanvasLocal();
        players.forEach(p => { p.hasGuessed = false; p.isDrawer = false; });
        
        if (gameState.drawerIndex >= players.length) gameState.drawerIndex = 0;
        let currentDrawer = players[gameState.drawerIndex];
        currentDrawer.isDrawer = true;
        
        sendHostBroadcast({ type: 'sync_round', current: gameState.currentRound, max: gameState.maxRounds });
        document.getElementById('round-display').innerText = `回合 ${gameState.currentRound} / ${gameState.maxRounds}`;
        sendHostBroadcast({ type: 'sync_players', players: players });
        sendHostBroadcast({ type: 'chat', sender: '系統', text: `▼ 輪到【${currentDrawer.name}】出題！`, msgType: 'system' });
        updatePlayersUI();

        if (currentDrawer.id === myId) openPromptModal(gameState.usedWords);
        else {
            sendHostBroadcast({ type: 'prompt_request', targetId: currentDrawer.id, usedWords: gameState.usedWords });
            sendHostBroadcast({ type: 'sync_word', text: "等待出題..." });
            document.getElementById('word-display').innerText = "等待出題...";
        }
        setToolLockStatus(currentDrawer.id !== myId);
    }

    function startGameTimer() {
        gameState.timeLeft = gameState.drawTime;
        let maskedWord = ""; for(let i=0; i<gameState.currentWord.length; i++) maskedWord += "_ ";
        sendHostBroadcast({ type: 'sync_word_start', masked: maskedWord, time: gameState.timeLeft });
        
        if(players[gameState.drawerIndex].id === myId) document.getElementById('word-display').innerText = `${gameState.currentWord} (你作畫)`;
        else document.getElementById('word-display').innerText = maskedWord;

        gameTimerInterval = setInterval(() => {
            gameState.timeLeft--;
            sendHostBroadcast({ type: 'sync_time', time: gameState.timeLeft });
            document.getElementById('game-timer').innerText = gameState.timeLeft;
            if (gameState.timeLeft <= 0) endRoundTurn();
        }, 1000);
    }

    function endRoundTurn() {
        clearInterval(gameTimerInterval);
        if(gameState.currentWord) sendHostBroadcast({ type: 'chat', sender: '系統', text: `時間到！答案是：【${gameState.currentWord}】`, msgType: 'info' });
        gameState.currentWord = ""; 
        gameState.drawerIndex++;
        if (gameState.drawerIndex >= players.length) { gameState.drawerIndex = 0; gameState.currentRound++; }
        if (gameState.currentRound > gameState.maxRounds) { gameState.isPlaying = false; setTimeout(triggerGameOver, 3000); } 
        else { setTimeout(startRoundTurn, 4000); }
    }

    function triggerGameOver() {
        let sortedPlayers = [...players].sort((a, b) => b.score - a.score);
        sendHostBroadcast({ type: 'game_over', players: sortedPlayers });
        showGameOverUI(sortedPlayers);
    }

    function handleChatAttempt(senderId, text) {
        let sender = players.find(p => p.id === senderId);
        let drawer = players[gameState.drawerIndex];

        if (senderId !== drawer.id && !sender.hasGuessed && text === gameState.currentWord && gameState.timeLeft > 0) {
            sender.hasGuessed = true;
            let timeBonus = Math.floor((gameState.timeLeft / gameState.drawTime) * 10) + 3;
            sender.score += timeBonus; drawer.score += 4; 

            sendHostBroadcast({ type: 'chat', sender: '系統', text: `🎉 ${sender.name} 猜對了！`, msgType: 'correct' });
            sendHostBroadcast({ type: 'sync_players', players: players }); updatePlayersUI();
            sendHostBroadcast({ type: 'score_anim', targetId: sender.id, points: timeBonus });
            sendHostBroadcast({ type: 'score_anim', targetId: drawer.id, points: 4 });
            showScoreAnim(sender.id, timeBonus); showScoreAnim(drawer.id, 4);
            checkAllGuessed();
        } else { sendHostBroadcast({ type: 'chat', sender: sender.name, text: text, msgType: 'guess' }); }
    }
    
    function checkAllGuessed() {
        if(players.length > 1 && players.every(p => p.isDrawer || p.hasGuessed)) {
            clearInterval(gameTimerInterval); setTimeout(endRoundTurn, 2000);
        }
    }

    function handleDataFromHost(data) {
        if (isHost) return; 
        
        if (data.type === 'sync_players') {
            players = data.players; updatePlayersUI();
            let myPlayer = players.find(p => p.id === myId);
            if(myPlayer) setToolLockStatus(!myPlayer.isDrawer);
        }
        else if (data.type === 'chat') addChat(data.sender, data.text, data.msgType);
        else if (data.type === 'sync_word') document.getElementById('word-display').innerText = data.text;
        else if (data.type === 'sync_round') document.getElementById('round-display').innerText = `回合 ${data.current} / ${data.max}`;
        else if (data.type === 'game_start') document.getElementById('round-display').innerText = `回合 1 / ${data.maxRounds}`;
        else if (data.type === 'game_over') showGameOverUI(data.players);
        else if (data.type === 'sync_word_start') {
            document.getElementById('game-timer').innerText = data.time;
            let myPlayer = players.find(p => p.id === myId);
            if(myPlayer && !myPlayer.isDrawer) document.getElementById('word-display').innerText = data.masked;
        }
        else if (data.type === 'sync_time') document.getElementById('game-timer').innerText = data.time;
        else if (data.type === 'draw') {
            if (data.senderId === myId) return; 
            executeDrawLine(data);
        }
        else if (data.type === 'clear_canvas') { 
            if (data.senderId === myId) return; 
            clearCanvasLocal(); 
        }
        else if (data.type === 'prompt_request') { 
            if (data.targetId === myId) openPromptModal(data.usedWords); 
        }
        else if (data.type === 'score_anim') showScoreAnim(data.targetId, data.points);
        else if (data.type === 'kicked') { alert("你已被房主踢除！"); location.href = window.location.href.split('?')[0]; }
        else if (data.type === 'sync_canvas') {
            let img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = data.image;
        }
    }

    function showGameOverUI(sortedPlayers) {
        document.getElementById('results-modal').classList.remove('hidden');
        let listHTML = ""; const medals = ['🥇', '🥈', '🥉'];
        sortedPlayers.forEach((p, i) => {
            let medal = i < 3 ? medals[i] : '🏅';
            listHTML += `<div class="result-item"><div>${medal} <b>${p.name}</b></div><div style="font-weight:bold;">${p.score} 分</div></div>`;
        });
        document.getElementById('results-list').innerHTML = listHTML;
    }

    function showLoading(msg) { document.getElementById('loading-text').innerText = msg; document.getElementById('loading-modal').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-modal').classList.add('hidden'); }
    
    function enterGameScreen(code) {
        currentRoomCode = code; 
        hideLoading(); document.getElementById('lobby-container').classList.add('hidden');
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('room-id-ui').innerHTML = `🔗 複製連結<br><small>(${code})</small>`;
    }
    
    function updatePlayersUI() {
        const container = document.getElementById('player-list-ui'); container.innerHTML = '';
        let sorted = [...players].sort((a, b) => b.score - a.score);
        sorted.forEach((p, idx) => {
            let cls = "player-item" + (p.isDrawer ? " drawer" : "") + (p.hasGuessed ? " guessed" : "");
            let kickBtnHTML = (isHost && p.id !== myId) ? `<button class="kick-btn" onclick="kickPlayer('${p.id}')">踢出</button>` : '';
            
            container.innerHTML += `<div class="${cls}" id="pcard-${p.id}">
                <div class="player-avatar">${idx+1}</div>
                <div class="player-info"><div class="player-name">${p.name}</div><div class="player-score">${p.score} pts</div></div>
                ${kickBtnHTML}
            </div>`;
        });

        let myPlayer = players.find(p => p.id === myId);
        let chatInput = document.getElementById('chat-input'); let chatBtn = document.getElementById('chat-submit-btn');
        if (myPlayer && myPlayer.isDrawer) { chatInput.disabled = true; chatInput.placeholder = "作畫中禁言"; chatBtn.disabled = true; } 
        else { chatInput.disabled = false; chatInput.placeholder = "輸入答案..."; chatBtn.disabled = false; }
    }
    
    function showScoreAnim(id, pts) {
        let card = document.getElementById(`pcard-${id}`);
        if(card) {
            let anim = document.createElement('div'); anim.className = 'score-float'; anim.innerText = `+${pts}`;
            card.appendChild(anim); setTimeout(() => anim.remove(), 1200);
        }
    }

    function setToolLockStatus(locked) {
        document.getElementById('canvas-lock-overlay').style.display = locked ? 'block' : 'none';
        document.getElementById('game-toolbar').style.opacity = locked ? '0.3' : '1';
    }

    // 【新增】雙選擇題庫與自訂題目介面邏輯
    let currentChoices = [];
    function openPromptModal(usedWords = []) {
        document.getElementById('prompt-modal').classList.remove('hidden');
        document.getElementById('custom-word-input').value = "";
        let timeLeft = 30; document.getElementById('modal-timer').innerText = timeLeft;
        
        // 過濾掉已經出現過的題目，確保絕不重複
        let availableWords = autoWordBank.filter(w => !usedWords.includes(w));
        if (availableWords.length < 2) availableWords = autoWordBank; // 如果真的玩了 80 局沒題庫了，再重新洗牌
        
        // 隨機抽取兩個不同的詞彙
        availableWords.sort(() => 0.5 - Math.random());
        currentChoices = [availableWords[0], availableWords[1]];
        
        document.getElementById('btn-choice-1').innerText = currentChoices[0];
        document.getElementById('btn-choice-2').innerText = currentChoices[1];
        
        promptInterval = setInterval(() => {
            timeLeft--; document.getElementById('modal-timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                submitWord(currentChoices[0]); // 時間到，自動選擇第一個選項
            }
        }, 1000);
    }
    
    function submitCustomWord() {
        let w = document.getElementById('custom-word-input').value.trim();
        if (!w) { alert('請輸入你想畫的題目！'); return; }
        submitWord(w);
    }
    
    function submitWord(word) {
        clearInterval(promptInterval); 
        document.getElementById('prompt-modal').classList.add('hidden');
        document.getElementById('word-display').innerText = `${word} (你作畫)`;
        
        if (isHost) { 
            gameState.currentWord = word; 
            gameState.usedWords.push(word); 
            startGameTimer(); 
        } else { 
            socket.emit('send_to_host', { type: 'submit_word', word: word }); 
        }
    }
    
    function handleChatKey(e) { if (e.key === 'Enter') submitChat(); }
    function submitChat() {
        let input = document.getElementById('chat-input'); let text = input.value.trim();
        if (!text) return; input.value = "";
        if (isHost) handleChatAttempt(myId, text); else socket.emit('send_to_host', { type: 'chat', senderId: myId, text: text });
    }
    function addChat(sender, text, type) {
        let box = document.getElementById('chat-messages'); box.innerHTML += `<div class="msg ${type}"><b>${sender}</b>：${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    const canvas = document.getElementById('drawing-board'); const ctx = canvas.getContext('2d');
    let isDrawing = false; let currentColor = '#000000'; let currentLineWidth = 5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    function changeColor(color) { 
        currentColor = color; 
        currentLineWidth = (color === '#ffffff') ? 35 : 5; // 如果選擇白色(橡皮擦)，筆刷變超粗
    }
    
    function requestClearCanvas() {
        let myPlayer = players.find(p => p.id === myId); if(!myPlayer || !myPlayer.isDrawer) return;
        clearCanvasLocal(); 
        if(isHost) sendHostBroadcast({ type: 'clear_canvas', senderId: myId }); 
        else socket.emit('send_to_host', { type: 'clear_canvas', senderId: myId });
    }
    function clearCanvasLocal() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
    }
    
    let lastSendTime = 0;
    function sendDrawData(x, y, isStart) {
        executeDrawLine({ x, y, color: currentColor, width: currentLineWidth, isStart });
        let now = Date.now();
        if (isStart || now - lastSendTime > 20) { 
            let data = { type: 'draw', x, y, color: currentColor, width: currentLineWidth, isStart, senderId: myId };
            if (isHost) sendHostBroadcast(data); 
            else if (socket) socket.emit('send_to_host', data);
            lastSendTime = now;
        }
    }

    function startDraw(e) {
        let myPlayer = players.find(p => p.id === myId); if(!myPlayer || !myPlayer.isDrawer) return;
        e.preventDefault(); isDrawing = true; const pos = getPos(e); sendDrawData(pos.x, pos.y, true);
    }
    function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); sendDrawData(pos.x, pos.y, false); }
    function endDraw(e) { if (isDrawing) { e.preventDefault(); isDrawing = false; } }

    let lastX = 0, lastY = 0;
    function executeDrawLine(data) {
        ctx.strokeStyle = data.color; ctx.lineWidth = data.width;
        if (data.isStart) { ctx.beginPath(); ctx.moveTo(data.x, data.y); lastX = data.x; lastY = data.y; } 
        else { ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(data.x, data.y); ctx.stroke(); lastX = data.x; lastY = data.y; }
    }

    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseout', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });
</script>
</body>
